name: Auto Article

on:
  schedule:
    # Pazartesi, Çarşamba, Cuma — TR 05:00 (UTC+3) ≈ 02:00 UTC
    - cron: '0 2 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: node scripts/generate-article.mjs

      - name: Quality warnings summary
        if: always()
        run: |
          if [ ! -f .auto-article-report.json ]; then
            echo "Rapor dosyası yok (üretim adımı başarısız olmuş olabilir)."
            exit 0
          fi
          node <<'NODE'
          const fs = require('fs');
          const reportPath = '.auto-article-report.json';
          if (!fs.existsSync(reportPath)) process.exit(0);
          const r = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          let md = '## Auto Article Report\n\n';
          md += `- **Slug:** \`${r.slug}\`\n`;
          md += `- **Title:** ${r.title}\n`;
          md += `- **Path:** \`${r.path}\`\n`;
          md += `- **Words:** ${r.wordCount}\n`;
          md += `- **FAQ count:** ${r.faqCount}\n`;
          if (r.metaTitleLength != null) md += `- **Meta title length:** ${r.metaTitleLength}\n`;
          if (r.metaDescriptionLength != null) md += `- **Meta description length:** ${r.metaDescriptionLength}\n`;
          md += '\n';
          if (Array.isArray(r.qualityWarnings) && r.qualityWarnings.length > 0) {
            md += '### Quality warnings\n\n';
            for (const w of r.qualityWarnings) md += `- ${w}\n`;
          } else {
            md += '### Quality warnings\n\n(yok)\n';
          }
          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          if (summaryFile) fs.appendFileSync(summaryFile, md);
          console.log(md);
          NODE

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "Değişiklik yok — commit atlanıyor."
            exit 0
          fi

          if [ -f .auto-article-report.json ]; then
            SLUG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.auto-article-report.json','utf8')).slug)")
            MSG="add article on ${SLUG}"
          else
            MSG="add auto-generated article"
          fi

          git add content/articles/ src/consts.ts
          git commit -m "${MSG}"
          git push
